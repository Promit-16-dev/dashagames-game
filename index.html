<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прыгающий кружок</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        #gameCanvas {
            border: 2px solid #16213e;
            background: linear-gradient(to bottom, #0f3460, #16213e);
            display: block;
            margin: 0 auto;
        }
        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .menu-button {
            width: 200px;
            padding: 15px;
            margin: 10px;
            font-size: 18px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .menu-button:hover {
            background: #ff6b6b;
        }
        .hidden {
            display: none !important;
        }
        #playerName {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 14px;
        }
        #score {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }
        #readyScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 48px;
            font-weight: bold;
        }
        #skinShop {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 10px;
            max-width: 300px;
        }
        .skin-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            padding: 10px;
            background: #16213e;
            border-radius: 5px;
        }
        .color-preview {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid white;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="350" height="600"></canvas>
    
    <div id="playerName"></div>
    <div id="score" class="hidden">0м</div>
    
    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="mainMenu">
        <div id="playerInfo" style="margin-bottom: 20px; text-align: center;"></div>
        <button class="menu-button" onclick="startGame()">🎮 ИГРАТЬ</button>
        <button class="menu-button" onclick="showStats()">📊 СТАТИСТИКА</button>
        <button class="menu-button" onclick="showSkinShop()">🎨 ПЕРСОНАЖ</button>
        <button class="menu-button" onclick="showMusicShop()">🎵 МУЗЫКА</button>
        <button class="menu-button" onclick="showLeaderboard()">🏆 ТОП 10</button>
    </div>
    
    <!-- ЭКРАН ГОТОВНОСТИ -->
    <div id="readyScreen" class="hidden">
        <div>ГОТОВЫ?</div>
    </div>
    
    <!-- МАГАЗИН СКИНОВ -->
    <div id="skinShopScreen" class="hidden" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a2e; color: white; overflow-y: auto;">
        <div style="padding: 20px;">
            <h2>Магазин скинов</h2>
            <p>Монет: <span id="coinBalance">0</span> 🪙</p>
            
            <h3>Цвета кружка</h3>
            <div id="skinsList"></div>
            
            <h3>Шляпки</h3>
            <div id="hatsList"></div>
            
            <h3>Загрузить своё фото</h3>
            <input type="file" id="photoUpload" accept="image/*" style="margin: 10px 0;">
            <button onclick="uploadCustomPhoto()" style="padding: 10px; background: #e94560; color: white; border: none; border-radius: 5px;">Загрузить</button>
            
            <button onclick="backToMenu()" style="margin-top: 20px; padding: 10px; background: #16213e; color: white; border: none; border-radius: 5px;">← Назад</button>
        </div>
    </div>
    
    <!-- СТАТИСТИКА -->
    <div id="statsScreen" class="hidden" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a2e; color: white;">
        <div style="padding: 20px;">
            <h2>Статистика</h2>
            <div id="statsContent"></div>
            <button onclick="backToMenu()" style="margin-top: 20px; padding: 10px; background: #16213e; color: white; border: none; border-radius: 5px;">← Назад</button>
        </div>
    </div>
    
    <!-- МУЗЫКА -->
    <div id="musicScreen" class="hidden" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a2e; color: white;">
        <div style="padding: 20px;">
            <h2>Музыка</h2>
            <p>Монет: <span id="musicCoinBalance">0</span> 🪙</p>
            <div id="musicList"></div>
            
            <h3>Добавить свою музыку</h3>
            <input type="file" id="musicUpload" accept="audio/*" style="margin: 10px 0;">
            <button onclick="uploadCustomMusic()" style="padding: 10px; background: #e94560; color: white; border: none; border-radius: 5px;">Загрузить</button>
            
            <button onclick="backToMenu()" style="margin-top: 20px; padding: 10px; background: #16213e; color: white; border: none; border-radius: 5px;">← Назад</button>
        </div>
    </div>
    
    <!-- ТОП 10 -->
    <div id="leaderboardScreen" class="hidden" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a2e; color: white;">
        <div style="padding: 20px;">
            <h2>ТОП 10 ИГРОКОВ</h2>
            <div id="leaderboardList"></div>
            <button onclick="backToMenu()" style="margin-top: 20px; padding: 10px; background: #16213e; color: white; border: none; border-radius: 5px;">← Назад</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Здесь будет ВЕСЬ код игры
        // Я разобью его на части для понятности
    </script>
</body>
</html>
